name: communitypulse-env
version: "1.0.0"
description: >
  An RL environment simulating humanitarian NGO volunteer coordination.
  An AI agent allocates limited volunteers to urgent humanitarian needs
  under time pressure and resource scarcity. The agent makes sequential
  decisions — assign, wait, or investigate — with dense reward signals
  after every step. Built to fill a real gap in humanitarian AI benchmarks.

tags:
  - openenv
  - humanitarian
  - resource-allocation
  - volunteer-coordination
  - decision-making
  - ngo

author: CommunityPulse Team

tasks:
  - id: 1
    name: clean_allocation
    difficulty: easy
    description: >
      Clear needs, enough volunteers, no deadlines.
      Agent must correctly assign volunteers to needs.
      Tests basic allocation capability.
    budget: 10
    needs_count: 4
    volunteers_count: 4

  - id: 2
    name: prioritization_under_scarcity
    difficulty: medium
    description: >
      Fewer volunteers than needs, some urgency uncertainty.
      Agent must prioritize HIGH urgency needs first.
      Tests prioritization and resource allocation under scarcity.
    budget: 14
    needs_count: 6
    volunteers_count: 3

  - id: 3
    name: deadline_skill_optimization
    difficulty: hard
    description: >
      Many needs, few volunteers, tight deadlines, skill constraints.
      Agent must optimize coverage, skill match, and deadline adherence.
      Tests multi-objective optimization under pressure.
    budget: 20
    needs_count: 10
    volunteers_count: 4

api:
  reset:
    method: POST
    path: /reset
    body:
      task_id:
        type: integer
        required: false
        default: 1
        description: Task ID (1=easy, 2=medium, 3=hard)

  step:
    method: POST
    path: /step
    body:
      action:
        type: object
        required: true
        description: >
          Action to take. Fields:
            type: "assign" | "wait" | "investigate"
            need_id: string (required for assign/investigate)
            volunteer_id: string (required for assign)

  state:
    method: GET
    path: /state
    description: Returns current observation without consuming a step.

  health:
    method: GET
    path: /health
    description: Health check endpoint. Returns {"status":"ok"}.

observation_space:
  episode_id: string
  task_id: integer
  step: integer
  time_remaining: integer
  needs:
    - id: string
      category: "medical|food|water|shelter|logistics"
      urgency: float  # 0.0-1.0
      confidence: float  # 0.0-1.0
      people_affected: integer
      deadline_steps: integer  # -1 means no deadline
      required_skill: string
      status: "open|assigned|resolved|expired"
      assigned_volunteer: string|null
  volunteers:
    - id: string
      name: string
      skill: string
      available: boolean
      busy_until_step: integer
  last_reward: float
  warnings: list[string]

action_space:
  type: "assign|wait|investigate"
  need_id: string|null
  volunteer_id: string|null

reward_space:
  value: float
  reason: string
  done: boolean
  info: object

reward_range: [-2.0, 2.5]

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  runtime_limit_minutes: 15
