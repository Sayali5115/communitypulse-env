name: communitypulse-env
version: "2.0.0"
description: >
  An RL environment simulating humanitarian NGO volunteer coordination.
  NOW WITH MULTI-AGENT SUPPORT: Multiple AI coordinators compete and cooperate,
  negotiating resource allocation under time pressure and uncertainty.
  
  Features:
  - Single-agent tasks (1-3): Basic → Scarcity → Optimization
  - Multi-agent task (4): Coordinator negotiation and coalition formation
  - Long-horizon task (5): 100-step crisis marathon with evolving needs
  
  Built to fill a real gap in humanitarian AI benchmarks.
tags:
  - openenv
  - humanitarian
  - resource-allocation
  - volunteer-coordination
  - multi-agent
  - negotiation
  - long-horizon
  - decision-making
  - ngo
author: CommunityPulse Team
tasks:
  - id: 1
    name: clean_allocation
    difficulty: easy
    description: >
      Clear needs, enough volunteers, no deadlines.
      Agent must correctly assign volunteers to needs.
      Tests basic allocation capability.
    budget: 10
    needs_count: 4
    volunteers_count: 4
    
  - id: 2
    name: prioritization_under_scarcity
    difficulty: medium
    description: >
      Fewer volunteers than needs, some urgency uncertainty.
      Agent must prioritize HIGH urgency needs first.
      Tests prioritization and resource allocation under scarcity.
    budget: 14
    needs_count: 6
    volunteers_count: 3
    
  - id: 3
    name: deadline_skill_optimization
    difficulty: hard
    description: >
      Many needs, few volunteers, tight deadlines, skill constraints.
      Agent must optimize coverage, skill match, and deadline adherence.
      Tests multi-objective optimization under pressure.
    budget: 20
    needs_count: 10
    volunteers_count: 4
    
  - id: 4
    name: multi_coordinator_negotiation
    difficulty: very_hard
    description: >
      MULTI-AGENT SCENARIO: 2-3 coordinators manage overlapping volunteer pools
      and compete for resource allocation. Coordinators can negotiate to swap
      volunteers, share intel on needs, or form coalitions.
      Tests theory-of-mind reasoning, negotiation strategy, and coalition formation.
    budget: 30
    needs_count: 15
    volunteers_count: 6
    coordinators: 2
    shared_volunteer_ratio: 0.3
    
  - id: 5
    name: crisis_marathon
    difficulty: extreme
    description: >
      LONG-HORIZON SCENARIO: 100-step episode with 50+ evolving needs.
      Volunteers experience fatigue (performance degrades over time).
      Needs form dependency chains (medical → shelter → food).
      Tests long-term planning, resource management, and recovery from mistakes.
    budget: 100
    needs_count: 50
    volunteers_count: 8
    volunteer_fatigue: true
    need_evolution: true

api:
  reset:
    method: POST
    path: /reset
    body:
      task_id:
        type: integer
        required: false
        default: 1
        description: Task ID (1-5)
        
  reset_multiagent:
    method: POST
    path: /reset_multiagent
    body:
      task_id:
        type: integer
        required: false
        default: 4
        description: Task ID (must be 4 for multi-agent)
      num_coordinators:
        type: integer
        required: false
        default: 2
        description: Number of coordinators (2-3)
        
  step:
    method: POST
    path: /step
    body:
      action:
        type: object
        required: true
        description: >
          Action to take. Fields:
            type: "assign" | "wait" | "investigate" | "negotiate"
            need_id: string (required for assign/investigate)
            volunteer_id: string (required for assign)
            
            FOR MULTI-AGENT:
            target_coordinator: string (required for negotiate)
            offer_type: "volunteer_swap" | "volunteer_loan" | "intel_share"
            
  step_multiagent:
    method: POST
    path: /step_multiagent
    body:
      action:
        type: object
        required: true
      coordinator_id:
        type: string
        required: false
        description: Which coordinator is acting (defaults to current turn)
        
  state:
    method: GET
    path: /state
    description: Returns current observation without consuming a step.
    
  state_multiagent:
    method: GET
    path: /state_multiagent
    description: Returns multi-agent observation with coordinator context.
    
  leaderboard:
    method: GET
    path: /leaderboard
    description: Get coordinator rankings (multi-agent only).
    
  health:
    method: GET
    path: /health
    description: Health check endpoint. Returns {"status":"ok"}.
    
observation_space:
  episode_id: string
  task_id: integer
  step: integer
  time_remaining: integer
  needs:
    - id: string
      category: "medical|food|water|shelter|logistics"
      urgency: float  # 0.0-1.0
      confidence: float  # 0.0-1.0
      people_affected: integer
      deadline_steps: integer  # -1 means no deadline
      required_skill: string
      status: "open|assigned|resolved|expired"
      assigned_volunteer: string|null
  volunteers:
    - id: string
      name: string
      skill: string
      available: boolean
      busy_until_step: integer
      fatigue_level: float  # 0.0-1.0 (Task 5 only)
  last_reward: float
  warnings: list[string]
  
  # Multi-agent fields (Task 4 only)
  current_coordinator: string
  coordinators:
    - id: string
      name: string
      assigned_needs: list[string]
      volunteer_pool_size: integer
      score: float
      negotiations_sent: integer
      negotiations_accepted: integer
  negotiations:
    - id: string
      from: string
      to: string
      type: string
      expires_in: integer
      
action_space:
  # Standard actions
  type: "assign|wait|investigate"
  need_id: string|null
  volunteer_id: string|null
  
  # Multi-agent actions
  type: "negotiate"
  target_coordinator: string
  offer_type: "volunteer_swap|volunteer_loan|intel_share"
  volunteer_id: string|null
  need_id: string|null
  
reward_space:
  value: float
  reason: string
  done: boolean
  info: object
  
reward_range: [-2.0, 3.0]

grading:
  task_1:
    metric: correct_assignments / total_needs
    target: 1.0
  task_2:
    metric: 0.6 * urgency_coverage + 0.4 * skill_match
    target: 0.95
  task_3:
    metric: 0.4 * coverage + 0.35 * skill_match + 0.25 * deadline_adherence
    target: 0.90
  task_4:
    metric: 0.3 * individual_score + 0.4 * coalition_bonus + 0.3 * negotiation_success
    target: 0.85
  task_5:
    metric: 0.5 * long_term_coverage + 0.3 * efficiency + 0.2 * recovery_rate
    target: 0.80

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  runtime_limit_minutes: 20
  
training:
  script: train.py
  framework: "unsloth + trl"
  recommended_episodes: 50
  recommended_epochs: 3
